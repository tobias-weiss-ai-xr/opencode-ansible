---
# Kernel sysctl tuning — defaults (conservative workstation values)
# Override per group_vars for specific host roles.

sysctl_settings:
  # Memory management
  vm.swappiness: 60
  vm.vfs_cache_pressure: 100
  vm.dirty_ratio: 20
  vm.dirty_background_ratio: 5
  vm.min_free_kbytes: 65536

  # Network
  net.core.somaxconn: 128
  net.ipv4.tcp_fastopen: 3
  net.ipv4.tcp_slow_start_after_idle: 0

  # Security
  kernel.kptr_restrict: 1
  kernel.dmesg_restrict: 1

sysctl_reload: yes
