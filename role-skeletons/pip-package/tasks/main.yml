# Pip package skeleton — tasks
---
- name: Install pip packages
  ansible.builtin.pip:
    name: "{{ pip_packages }}"
    executable: "{{ pip_executable }}"
    state: present
  when: pip_packages | length > 0

- name: Install from requirements file
  ansible.builtin.pip:
    requirements: "{{ pip_requirements_file }}"
    executable: "{{ pip_executable }}"
    state: present
  when: pip_requirements_file | length > 0
